---
zsystems:
  hosts:
    z32a:
      ansible_host: 10.1.1.2
      ansible_user: ibmuser
      ansible_port: 65522
      ansible_password: sys1

      # --- Critical: use the collection's SSH connection plugin ---
      ansible_connection: ibm.ibm_zos_core.zos_ssh

      # --- Shell must be sh, not bash (USS default) ---
      ansible_shell_type: sh

      # --- Environment applied at connection time by the plugin ---
      environment:
        _BPXK_AUTOCVT: "ON"
        ZOAU_HOME: "{{ ZOAU }}"
        PYTHONPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib"
        LIBPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib:/lib:/usr/lib:."
        PATH: "{{ ZOAU }}/bin:{{ PYZ }}/bin:/bin:/var/bin:/usr/sbin"
        _CEE_RUNOPTS: "FILETAG(AUTOCVT,AUTOTAG) POSIX(ON)"
        _TAG_REDIR_ERR: "txt"
        _TAG_REDIR_IN: "txt"
        _TAG_REDIR_OUT: "txt"
        LANG: "C"