---
PYZ: "/usr/lpp/IBM/cyp/v3r14/pyz"
ZOAU: "/usr/lpp/IBM/zoau/v1r4"

# Optional: If using ZOAU Collections, you may need to pin versions
ZOAU_COLLECTIONS_VERSION: "1.4.0"

ansible_python_interpreter: "{{ PYZ }}/bin/python3"

################################################################################
# Conditional environment setup based on use case
################################################################################
environment_vars:
  _BPXK_AUTOCVT: "ON"
  ZOAU_HOME: "{{ ZOAU }}"
  PYTHONPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib"
  LIBPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib:/lib:/usr/lib:."
  PATH: "{{ ZOAU }}/bin:{{ PYZ }}/bin:/bin:/var/bin:/usr/sbin"
  _CEE_RUNOPTS: "FILETAG(AUTOCVT,AUTOTAG) POSIX(ON)"
  _TAG_REDIR_ERR: "txt"
  _TAG_REDIR_IN: "txt"
  _TAG_REDIR_OUT: "txt"
  LANG: "C"
  # Optional additions depending on workload:
  # ZOAU_CHARSET: "UTF-8"  # If you need UTF-8 support
  # _JAVA_OPTIONS: "-Dfile.encoding=UTF-8"  # If using Java tooling