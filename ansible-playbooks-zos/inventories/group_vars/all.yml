---
################################################################################
# Paths
################################################################################
PYZ: "/usr/lpp/IBM/cyp/v3r14/pyz"
ZOAU: "/usr/lpp/IBM/zoau/v1r4"

ZOAU_COLLECTIONS_VERSION: "1.4.0"

ansible_python_interpreter: "{{ PYZ }}/bin/python3"

################################################################################
# Environment — referenced by plays via `environment: "{{ zos_environment }}"`
# This name is conventional and explicit; nothing magic activates it otherwise.
################################################################################
zos_environment:
  _BPXK_AUTOCVT: "ON"
  ZOAU_HOME: "{{ ZOAU }}"
  PYTHONPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib"
  LIBPATH: "{{ ZOAU }}/lib:{{ PYZ }}/lib:/lib:/usr/lib:."
  PATH: "{{ ZOAU }}/bin:{{ PYZ }}/bin:/usr/bin:/bin:/var/bin:/usr/sbin"
  _CEE_RUNOPTS: "FILETAG(AUTOCVT,AUTOTAG) POSIX(ON)"
  _TAG_REDIR_ERR: "txt"
  _TAG_REDIR_IN: "txt"
  _TAG_REDIR_OUT: "txt"
  LANG: "C"