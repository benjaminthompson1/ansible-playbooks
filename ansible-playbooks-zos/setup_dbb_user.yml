################################################################################
# setup_dbb_user.yml
#
# Adds the IBM DBB v3 working files (writable DBB_BUILD directory and
# site-customised Languages.yaml) to a z/OS USS user account.
# Idempotent — safe to re-run.
#
# What it does:
#   1. Creates ~/zBuilder/build/ owned by target_user.
#   2. Copies dbb-build.yaml + language YAML samples from $DBB_HOME (preserving
#      UTF-8 file tags via cp -p).
#   3. Templates Languages.yaml from group_vars (dbb_languages_datasets).
#   4. Tags Languages.yaml as UTF-8.
#   5. chowns all DBB files to target_user.
#   6. Smoke test — confirms file presence, tags, ownership, and that the
#      target user's .profile has DBB_HOME exported.
#
# This playbook does NOT modify .profile — the DBB env vars are already
# present in /u/ibmuser/.profile (the template copied by setup_runner_user.yml)
# from the manual customisation recorded in the Obsidian DBB Customisation note.
#
# Prerequisites:
#   - setup_runner_user.yml has been run for target_user (or .profile is
#     otherwise present with DBB env vars).
#   - DBB v3 is installed at /usr/lpp/IBM/dbb on z32a.
#   - Connecting user (IBMUSER) has BPX.SUPERUSER access or UID 0 so it can
#     chown files into another user's home.
#
# Usage:
#   ansible-playbook -i inventories/inventory.yml setup_dbb_user.yml \
#       -e "target_user=cicsdev"
#
# Optional vars:
#   -e "target_group=SYS1"      # default group for chown (default: SYS1)
#   -e "boolean_debug=true"     # verbose smoke output
#
# Skip Languages.yaml templating (e.g. to preserve hand-tuned values):
#   ansible-playbook -i inventories/inventory.yml setup_dbb_user.yml \
#       -e "target_user=cicsdev" --skip-tags languages
#
# Tags: validate, dirs, copy, languages, smoketest
################################################################################

---
- name: Set up DBB v3 working files for a z/OS user
  hosts: z32a
  gather_facts: no
  environment: "{{ zos_environment }}"

  vars:
    boolean_debug: false
    target_group: "SYS1"
    target_home: "/u/{{ target_user | default('') }}"
    target_profile: "/u/{{ target_user | default('') }}/.profile"
    dbb_build_dir: "/u/{{ target_user | default('') }}/{{ dbb.user_build_subdir }}"

  tasks:

    ############################################################################
    # 0. Validate required input and prerequisites
    ############################################################################
    - name: Assert target_user is provided
      ansible.builtin.assert:
        that:
          - target_user is defined
          - target_user | length > 0
        fail_msg: |
          target_user is required.
          Usage: -e "target_user=<userid>"
        success_msg: "Setting up DBB for user: {{ target_user }}"
      tags: [validate]

    - name: Verify target user's .profile exists (setup_runner_user.yml first?)
      ansible.builtin.stat:
        path: "{{ target_profile }}"
      register: target_profile_stat
      tags: [validate]

    - name: Assert prerequisites
      ansible.builtin.assert:
        that:
          - target_profile_stat.stat.exists
        fail_msg: |
          {{ target_profile }} does not exist.
          Run setup_runner_user.yml first to copy IBMUSER's .profile template:
            ansible-playbook -i inventories/inventory.yml setup_runner_user.yml \
                -e "target_user={{ target_user }}"
      tags: [validate]

    - name: Verify DBB install root exists
      ansible.builtin.stat:
        path: "{{ dbb.home }}"
      register: dbb_home_stat
      tags: [validate]

    - name: Assert DBB is installed
      ansible.builtin.assert:
        that:
          - dbb_home_stat.stat.exists
          - dbb_home_stat.stat.isdir
        fail_msg: "DBB not found at {{ dbb.home }}. Confirm the install."
      tags: [validate]

    ############################################################################
    # 1. Create writable DBB_BUILD directory owned by target_user
    ############################################################################
    - name: Create DBB_BUILD directory
      ansible.builtin.file:
        path: "{{ dbb_build_dir }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_group }}"
        mode: "0755"
      tags: [dirs]

    ############################################################################
    # 2. Copy dbb-build.yaml and language YAML samples (preserve UTF-8 tags
    #    via cp -p; `creates:` makes the dbb-build.yaml copy idempotent).
    ############################################################################
    - name: Copy dbb-build.yaml into DBB_BUILD
      ansible.builtin.command: cp -p {{ dbb.build_template_dir }}/dbb-build.yaml {{ dbb_build_dir }}/dbb-build.yaml
      args:
        creates: "{{ dbb_build_dir }}/dbb-build.yaml"
      tags: [copy]

    - name: Copy language YAML samples into DBB_BUILD (excluding Languages.yaml)
      ansible.builtin.shell: |
        set -e
        for f in {{ dbb.samples_dir }}/*.yaml; do
          base=$(basename "$f")
          if [ "$base" != "Languages.yaml" ] && [ ! -f "{{ dbb_build_dir }}/$base" ]; then
            cp -p "$f" "{{ dbb_build_dir }}/$base"
            echo "copied $base"
          fi
        done
      register: copy_samples
      changed_when: copy_samples.stdout != ""
      tags: [copy]

    ############################################################################
    # 3. Template Languages.yaml with site-specific dataset values
    ############################################################################
    - name: Template Languages.yaml from group_vars
      ansible.builtin.template:
        src: Languages.yaml.j2
        dest: "{{ dbb_build_dir }}/Languages.yaml"
        owner: "{{ target_user }}"
        group: "{{ target_group }}"
        mode: "0644"
      tags: [languages]

    - name: Tag Languages.yaml as UTF-8 (DBB Java reads via file tag)
      ansible.builtin.command: chtag -tc UTF-8 {{ dbb_build_dir }}/Languages.yaml
      changed_when: false
      tags: [languages]

    ############################################################################
    # 4. Set ownership on all copied/templated DBB files to target_user
    ############################################################################
    - name: Set ownership on everything in DBB_BUILD
      ansible.builtin.file:
        path: "{{ dbb_build_dir }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_group }}"
        recurse: true
      tags: [copy, languages]

    ############################################################################
    # 5. Smoke tests — static checks only
    ############################################################################
    - name: List DBB_BUILD contents
      ansible.builtin.command: ls -1 {{ dbb_build_dir }}
      register: dbb_build_listing
      changed_when: false
      tags: [smoketest]

    - name: Verify Languages.yaml tag
      ansible.builtin.command: ls -T {{ dbb_build_dir }}/Languages.yaml
      register: languages_tag
      changed_when: false
      tags: [smoketest]

    - name: Verify DBB_BUILD ownership
      ansible.builtin.command: ls -ld {{ dbb_build_dir }}
      register: dbb_build_ownership
      changed_when: false
      tags: [smoketest]

    - name: Verify target .profile has DBB_HOME exported
      ansible.builtin.command: grep '^export DBB_HOME=' {{ target_profile }}
      register: profile_dbb_export
      changed_when: false
      failed_when: profile_dbb_export.rc != 0
      tags: [smoketest]

    - name: Display debug info (boolean flag)
      ansible.builtin.debug:
        msg:
          - "DBB_BUILD listing:"
          - "{{ dbb_build_listing.stdout_lines }}"
          - "Languages.yaml tag:  {{ languages_tag.stdout }}"
          - "DBB_BUILD ownership: {{ dbb_build_ownership.stdout }}"
          - "Profile DBB export:  {{ profile_dbb_export.stdout }}"
      when: boolean_debug | bool
      tags: [smoketest]

    - name: Assert smoke test results
      ansible.builtin.assert:
        that:
          - "'Languages.yaml' in dbb_build_listing.stdout"
          - "'dbb-build.yaml' in dbb_build_listing.stdout"
          - "'UTF-8' in languages_tag.stdout"
          - target_user in dbb_build_ownership.stdout
          - "'export DBB_HOME=' + dbb.home in profile_dbb_export.stdout"
        fail_msg: |
          DBB smoke test failed for {{ target_user }}. Check:
            DBB_BUILD listing:   {{ dbb_build_listing.stdout_lines }}
            Languages.yaml tag:  {{ languages_tag.stdout }}
            Ownership:           {{ dbb_build_ownership.stdout }}
            Profile DBB export:  {{ profile_dbb_export.stdout }}
        success_msg: |
          DBB user setup complete for {{ target_user }} and verified.
      tags: [smoketest]

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "DBB setup complete for {{ target_user }}:"
          - "  DBB_HOME:    {{ dbb.home }}"
          - "  DBB_BUILD:   {{ dbb_build_dir }}"
          - "  Datasets:    {{ dbb_languages_datasets | length }} variables in Languages.yaml"
          - "  Owner:       {{ target_user }}:{{ target_group }}"
          - "  Next:        SSH in as {{ target_user }} and run 'dbb --version'"
          - "               then point a pipeline at this user to verify end-to-end."
