################################################################################
# setup_dbb_user.yml
#
# Adds IBM Dependency Based Build (DBB) v3 setup to a z/OS USS user account
# that already has the GitLab Runner base set up (via setup_runner_user.yml).
# Idempotent — safe to re-run.
#
# What it does:
#   1. Adds DBB env vars (DBB_HOME, DBB_BUILD, PIPELINE_WORKSPACE) and a
#      DBB-first PATH to ~/.profile via a marker block.
#   2. Re-tags ~/.profile as IBM-1047 (in case the edit stripped the tag).
#   3. Creates ~/zBuilder/build (the writable DBB_BUILD directory).
#   4. Copies dbb-build.yaml and language sample YAMLs from $DBB_HOME into
#      ~/zBuilder/build/.
#   5. Templates Languages.yaml with site-specific dataset values from
#      group_vars/all.yml (dbb_languages_datasets).
#   6. Smoke test — confirms DBB_HOME resolves, dbb is on PATH, dbb --version
#      returns a sane string, and Languages.yaml exists and is UTF-8 tagged.
#
# Prerequisites:
#   - setup_runner_user.yml has been run for this user (.profile is tagged
#     IBM-1047 and zopen-config loads for non-interactive shells).
#   - DBB v3 is installed at /usr/lpp/IBM/dbb on the target host.
#
# Standard usage (current inventory user):
#   ansible-playbook -i inventories/inventory.yml setup_dbb_user.yml
#
# Onboard a different user:
#   ansible-playbook -i inventories/inventory.yml setup_dbb_user.yml \
#       -e "ansible_user=cicsdev ansible_password=secret"
#
# Skip Languages.yaml templating (e.g. to preserve hand-tuned values):
#   ansible-playbook -i inventories/inventory.yml setup_dbb_user.yml \
#       --skip-tags languages
#
# Tags: profile, chtag, dirs, copy, languages, smoketest
################################################################################

---
- name: Set up DBB v3 per-user environment on z/OS
  hosts: z32a
  gather_facts: no
  environment: "{{ zos_environment }}"

  vars:
    boolean_debug: false
    target_home: "/u/{{ ansible_user }}"
    dbb_build_dir: "{{ target_home }}/{{ dbb.user_build_subdir }}"

  tasks:

    ############################################################################
    # 1. Patch ~/.profile — add DBB exports + DBB-first PATH via marker block.
    #    Banner block (interactive-only) is added at the same time so login
    #    sessions show a DBB version line.
    ############################################################################
    - name: Add DBB env vars and PATH update to ~/.profile
      ibm.ibm_zos_core.zos_blockinfile:
        src: "{{ target_home }}/.profile"
        marker: "# {mark} ANSIBLE MANAGED — DBB ENV (setup_dbb_user.yml)"
        block: |
          # -----------------------------------------------------------------------------
          # IBM Dependency Based Build (DBB) v3
          # -----------------------------------------------------------------------------
          export DBB_HOME={{ dbb.home }}
          export DBB_BUILD=${HOME}/{{ dbb.user_build_subdir }}
          export PIPELINE_WORKSPACE=${HOME}/{{ dbb.user_workspace_subdir }}
          [ ! -d "${DBB_HOME}" ] && echo "Warning: DBB_HOME not found" >&2

          # Prepend DBB and other tool bin dirs to PATH
          export PATH=${DBB_HOME}/bin:${JAVA_HOME}/bin:${PYTHON_HOME}/bin:${ZOAU_HOME}/bin:${NODE_HOME}/bin:/usr/bin:${PATH}

          # DBB banner — interactive shells only
          if [[ $- == *i* ]]; then
            echo ""
            echo "DBB:"
            if command -v dbb >/dev/null 2>&1; then
              dbb --version 2>&1 | head -1
            else
              echo "  Not installed"
            fi
          fi
        state: present
        encoding: IBM-1047
      tags: [profile]

    ############################################################################
    # 2. Re-tag ~/.profile (defensive — blockinfile preserves tag, but cheap
    #    to assert)
    ############################################################################
    - name: Tag ~/.profile as IBM-1047
      ansible.builtin.command: chtag -tc IBM-1047 {{ target_home }}/.profile
      changed_when: false
      tags: [chtag]

    ############################################################################
    # 3. Create ~/zBuilder/build (writable DBB_BUILD)
    ############################################################################
    - name: Create DBB_BUILD directory
      ansible.builtin.file:
        path: "{{ dbb_build_dir }}"
        state: directory
        mode: "0755"
      tags: [dirs]

    ############################################################################
    # 4. Copy dbb-build.yaml + language YAML samples from $DBB_HOME.
    #    Use shell `cp` (not ansible.builtin.copy) so USS file tags are
    #    preserved on the copies. `creates:` makes this idempotent.
    ############################################################################
    - name: Copy dbb-build.yaml into DBB_BUILD
      ansible.builtin.command: cp {{ dbb.build_template_dir }}/dbb-build.yaml {{ dbb_build_dir }}/dbb-build.yaml
      args:
        creates: "{{ dbb_build_dir }}/dbb-build.yaml"
      tags: [copy]

    - name: Copy language YAML samples into DBB_BUILD (excluding Languages.yaml)
      ansible.builtin.shell: |
        for f in {{ dbb.samples_dir }}/*.yaml; do
          base=$(basename "$f")
          if [ "$base" != "Languages.yaml" ] && [ ! -f "{{ dbb_build_dir }}/$base" ]; then
            cp "$f" "{{ dbb_build_dir }}/$base"
          fi
        done
      register: copy_samples
      changed_when: copy_samples.stdout != "" or copy_samples.stderr != ""
      tags: [copy]

    ############################################################################
    # 5. Template Languages.yaml with site-specific dataset values
    ############################################################################
    - name: Template Languages.yaml from group_vars
      ansible.builtin.template:
        src: Languages.yaml.j2
        dest: "{{ dbb_build_dir }}/Languages.yaml"
        mode: "0644"
      tags: [languages]

    - name: Tag Languages.yaml as UTF-8 (DBB Java reads via file tag)
      ansible.builtin.command: chtag -tc UTF-8 {{ dbb_build_dir }}/Languages.yaml
      changed_when: false
      tags: [languages]

    ############################################################################
    # 6. Smoke tests
    ############################################################################
    - name: Verify DBB_BUILD contains the expected files
      ansible.builtin.command: ls -1 {{ dbb_build_dir }}
      register: dbb_build_listing
      changed_when: false
      tags: [smoketest]

    - name: Verify Languages.yaml is UTF-8 tagged
      ansible.builtin.command: ls -T {{ dbb_build_dir }}/Languages.yaml
      register: languages_tag
      changed_when: false
      tags: [smoketest]

    - name: Source ~/.profile and check DBB_HOME + dbb binary
      ansible.builtin.shell: |
        /bin/bash -c 'source {{ target_home }}/.profile >/dev/null 2>&1 && \
                      echo "DBB_HOME=$DBB_HOME" && \
                      echo "DBB_BUILD=$DBB_BUILD" && \
                      command -v dbb && \
                      dbb --version 2>&1 | head -1'
      register: dbb_check
      changed_when: false
      failed_when: dbb_check.rc != 0
      tags: [smoketest]

    - name: Display debug info (boolean flag)
      ansible.builtin.debug:
        msg:
          - "DBB_BUILD listing:"
          - "{{ dbb_build_listing.stdout_lines }}"
          - "Languages.yaml tag: {{ languages_tag.stdout }}"
          - "DBB shell check:"
          - "{{ dbb_check.stdout_lines }}"
      when: boolean_debug | bool
      tags: [smoketest]

    - name: Assert smoke test results
      ansible.builtin.assert:
        that:
          - "'Languages.yaml' in dbb_build_listing.stdout"
          - "'dbb-build.yaml' in dbb_build_listing.stdout"
          - "'UTF-8' in languages_tag.stdout"
          - "'DBB_HOME=' + dbb.home in dbb_check.stdout"
          - "'Dependency Based Build version' in dbb_check.stdout"
        fail_msg: |
          DBB smoke test failed. Check:
            - {{ dbb_build_dir }}/ contents
            - Languages.yaml tag (expected UTF-8)
            - ~/.profile DBB block (sourceable, exports DBB_HOME)
            - dbb binary on PATH
        success_msg: |
          DBB user setup complete and verified.
      tags: [smoketest]

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "DBB setup complete for {{ ansible_user }}:"
          - "  DBB_HOME:  {{ dbb.home }}"
          - "  DBB_BUILD: {{ dbb_build_dir }}"
          - "  Datasets:  {{ dbb_languages_datasets | length }} variables in Languages.yaml"
          - "  Next:      run a pipeline against this user to verify end-to-end."
