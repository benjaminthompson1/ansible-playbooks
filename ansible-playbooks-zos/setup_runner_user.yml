################################################################################
# setup_runner_user.yml
#
# Onboards a new z/OS USS user as a GitLab Runner workload account by copying
# IBMUSER's `.profile` as the canonical template. Idempotent — safe to re-run.
#
# What it does:
#   1. Copies /u/ibmuser/.profile -> /u/<target_user>/.profile (preserving the
#      IBM-1047 file tag via cp -p).
#   2. chowns the copied .profile to target_user.
#   3. Verifies and re-applies the IBM-1047 tag defensively.
#   4. Creates ~/gitlab-runner/{builds,cache}/ owned by target_user.
#   5. Smoke test — confirms .profile exists, tag, ownership, expected exports,
#      and the runner directories.
#
# Why a template copy (rather than blockinfile patching):
#   IBMUSER's .profile is the canonical template. It already has zopen-config
#   loading at column-0 and the DBB env vars from the manual setup recorded in
#   the Obsidian notes (GitLab Ultimate for zOS / DBB Customisation). Copying
#   the file is simpler, more idempotent, and matches z/OS skeleton-home
#   conventions.
#
# Prerequisites:
#   - target_user has been created with an OMVS segment, e.g.:
#       ADDUSER cicsdev OMVS(HOME(/u/cicsdev) PROGRAM(/bin/sh))
#   - /u/<target_user>/ exists and is owned by target_user.
#   - target_user has NO .profile yet (this playbook skips if one exists).
#   - /u/ibmuser/.profile exists and is the customised template.
#   - The connecting user (IBMUSER) has BPX.SUPERUSER access or UID 0 so it
#     can chown files into another user's home.
#
# Usage:
#   ansible-playbook -i inventories/inventory.yml setup_runner_user.yml \
#       -e "target_user=cicsdev"
#
# Optional vars:
#   -e "target_group=SYS1"      # default group for chown (default: SYS1)
#   -e "boolean_debug=true"     # verbose smoke output
#
# Tags: validate, profile, dirs, smoketest
################################################################################

---
- name: Onboard a z/OS user with the GitLab Runner .profile template
  hosts: z32a
  gather_facts: no
  environment: "{{ zos_environment }}"

  vars:
    boolean_debug: false
    target_group: "SYS1"
    template_profile: "/u/ibmuser/.profile"
    target_home: "/u/{{ target_user | default('') }}"
    target_profile: "/u/{{ target_user | default('') }}/.profile"

  tasks:

    ############################################################################
    # 0. Validate required input and prerequisites
    ############################################################################
    - name: Assert target_user is provided
      ansible.builtin.assert:
        that:
          - target_user is defined
          - target_user | length > 0
          - target_user != "ibmuser"
        fail_msg: |
          target_user is required and must not be 'ibmuser'.
          Usage: -e "target_user=<userid>"
        success_msg: "Onboarding user: {{ target_user }}"
      tags: [validate]

    - name: Verify /u/ibmuser/.profile template exists
      ansible.builtin.stat:
        path: "{{ template_profile }}"
      register: template_stat
      tags: [validate]

    - name: Assert template .profile is present and tagged
      ansible.builtin.assert:
        that:
          - template_stat.stat.exists
        fail_msg: "Template .profile not found at {{ template_profile }}"
      tags: [validate]

    - name: Verify target user's home directory exists
      ansible.builtin.stat:
        path: "{{ target_home }}"
      register: target_home_stat
      tags: [validate]

    - name: Assert target home directory exists
      ansible.builtin.assert:
        that:
          - target_home_stat.stat.exists
          - target_home_stat.stat.isdir
        fail_msg: |
          {{ target_home }} does not exist. Create the user with an OMVS
          segment first:
            ADDUSER {{ target_user | upper }} OMVS(HOME({{ target_home }}) PROGRAM(/bin/sh))
      tags: [validate]

    ############################################################################
    # 1. Copy IBMUSER's .profile template to new user's home.
    #    cp -p preserves attributes including the IBM-1047 file tag.
    #    `creates:` makes this idempotent — skips if target .profile exists.
    ############################################################################
    - name: Check whether target .profile already exists
      ansible.builtin.stat:
        path: "{{ target_profile }}"
      register: target_profile_stat
      tags: [profile]

    - name: Copy IBMUSER's .profile template to new user's home
      ansible.builtin.command: cp -p {{ template_profile }} {{ target_profile }}
      args:
        creates: "{{ target_profile }}"
      when: not target_profile_stat.stat.exists
      tags: [profile]

    - name: Set ownership of copied .profile to target user
      ansible.builtin.file:
        path: "{{ target_profile }}"
        owner: "{{ target_user }}"
        group: "{{ target_group }}"
        mode: "0644"
      tags: [profile]

    ############################################################################
    # 2. Defensively re-tag .profile as IBM-1047 (cp -p should preserve, but
    #    chtag is idempotent and cheap).
    ############################################################################
    - name: Tag target .profile as IBM-1047
      ansible.builtin.command: chtag -tc IBM-1047 {{ target_profile }}
      changed_when: false
      tags: [profile]

    ############################################################################
    # 3. Create ~/gitlab-runner/{builds,cache} owned by target_user
    ############################################################################
    - name: Create gitlab-runner workspace directories
      ansible.builtin.file:
        path: "{{ target_home }}/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_group }}"
        mode: "0755"
      loop:
        - "{{ gitlab_runner.user_builds_subdir }}"
        - "{{ gitlab_runner.user_cache_subdir }}"
      tags: [dirs]

    ############################################################################
    # 4. Smoke tests — static checks only (no `su` to target user)
    ############################################################################
    - name: Verify target .profile tag
      ansible.builtin.command: ls -T {{ target_profile }}
      register: profile_tag
      changed_when: false
      tags: [smoketest]

    - name: Verify target .profile ownership
      ansible.builtin.command: ls -l {{ target_profile }}
      register: profile_ownership
      changed_when: false
      tags: [smoketest]

    - name: Verify expected exports are present in copied .profile
      # ^ anchors only the DBB exports; zopen-config is typically dot-sourced
      # (`. /usr/local/zopen/etc/zopen-config`) so we match it anywhere on a line.
      ansible.builtin.command: grep -E '^(export DBB_HOME=|export DBB_BUILD=)|zopen-config' {{ target_profile }}
      register: profile_content
      changed_when: false
      failed_when: profile_content.rc != 0
      tags: [smoketest]

    - name: Verify runner directories exist with correct ownership
      ansible.builtin.command: ls -ld {{ target_home }}/{{ item }}
      loop:
        - "{{ gitlab_runner.user_builds_subdir }}"
        - "{{ gitlab_runner.user_cache_subdir }}"
      register: dir_listings
      changed_when: false
      tags: [smoketest]

    - name: Display debug info (boolean flag)
      ansible.builtin.debug:
        msg:
          - "Tag:        {{ profile_tag.stdout }}"
          - "Ownership:  {{ profile_ownership.stdout }}"
          - "Exports:    {{ profile_content.stdout_lines }}"
          - "Directories:"
          - "{{ dir_listings.results | map(attribute='stdout') | list }}"
      when: boolean_debug | bool
      tags: [smoketest]

    - name: Assert smoke test results
      ansible.builtin.assert:
        that:
          - "'IBM-1047' in profile_tag.stdout"
          - target_user in profile_ownership.stdout
          - "'DBB_HOME' in profile_content.stdout"
          - "'zopen-config' in profile_content.stdout"
        fail_msg: |
          Smoke test failed for {{ target_user }}:
            tag:        {{ profile_tag.stdout }}
            ownership:  {{ profile_ownership.stdout }}
            exports:    {{ profile_content.stdout_lines }}
          Check that /u/ibmuser/.profile is the customised template.
        success_msg: |
          Onboarding complete for {{ target_user }}.
      tags: [smoketest]

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "User onboarded: {{ target_user }}"
          - "  .profile:    {{ target_profile }} ({{ profile_tag.stdout.split()[0] }} {{ profile_tag.stdout.split()[1] }})"
          - "  builds_dir:  {{ target_home }}/{{ gitlab_runner.user_builds_subdir }}"
          - "  cache_dir:   {{ target_home }}/{{ gitlab_runner.user_cache_subdir }}"
          - "  Next:        run setup_dbb_user.yml to add DBB workspace files,"
          - "               or onboard a different user with -e 'target_user=<id>'"
